name: DevInu PR Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  actions: read

concurrency:
  group: devinu-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  devinu-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # スキップ条件の判定
    if: |
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '@devinu rereview') &&
        github.event.comment.user.login != 'github-actions[bot]'
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run DevInu
        # action.yml が ghcr.io/spherestacking/devinu:latest を pull して実行する
        # （このリポジトリ自体をテスト用に uses: ./ で参照）
        uses: ./
        with:
          max_budget_usd: "5"
          # min_severity: "medium"        # critical/high/medium/low
          # enable_ci_analysis: "true"     # CI 失敗ログをちくわが分析
          # skip_labels: "skip-devinu"     # スキップするラベル（カンマ区切り）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
