name: Chollows PR Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  actions: read

concurrency:
  group: chollows-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  chollows-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '@chollows rereview') &&
        github.event.comment.user.login != 'github-actions[bot]'
      )

    steps:
      - name: Extract review instructions
        id: instructions
        if: github.event_name == 'issue_comment'
        run: |
          BODY="${{ github.event.comment.body }}"
          # "@chollows rereview" 以降のテキストを抽出
          INSTRUCTIONS="${BODY#*@chollows rereview}"
          INSTRUCTIONS="$(echo "$INSTRUCTIONS" | sed 's/^[[:space:]]*//')"
          echo "text=$INSTRUCTIONS" >> "$GITHUB_OUTPUT"
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Chollows
        uses: ./
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          max_budget_usd: "5"
          review_instructions: ${{ steps.instructions.outputs.text }}
          # min_severity: "medium"
          # disabled_agents: ""
          # skip_labels: "skip-chollows"
